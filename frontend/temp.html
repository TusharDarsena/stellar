<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#2a0088",
                    "primary-container": "#947dff",
                    "outline-variant": "#484555",
                    "on-primary-fixed": "#1c0062",
                    "surface-variant": "#36333e",
                    "on-secondary-fixed": "#171c23",
                    "surface-bright": "#3a3842",
                    "inverse-surface": "#e6e0ee",
                    "surface-container-lowest": "#0f0d16",
                    "on-tertiary-container": "#442000",
                    "on-secondary-container": "#b1b5be",
                    "secondary-fixed-dim": "#c2c7d0",
                    "on-secondary-fixed-variant": "#42474f",
                    "secondary-fixed": "#dee3ec",
                    "secondary": "#c2c7d0",
                    "tertiary-container": "#d7791f",
                    "on-error-container": "#ffdad6",
                    "tertiary-fixed": "#ffdcc4",
                    "on-tertiary-fixed": "#2f1400",
                    "on-tertiary": "#4e2600",
                    "surface": "#14121b",
                    "outline": "#938ea1",
                    "surface-container-highest": "#36333e",
                    "on-secondary": "#2c3138",
                    "tertiary-fixed-dim": "#ffb780",
                    "on-tertiary-fixed-variant": "#6f3800",
                    "primary-fixed": "#e6deff",
                    "on-error": "#690005",
                    "surface-container-low": "#1c1a24",
                    "on-primary": "#31009a",
                    "inverse-on-surface": "#312f39",
                    "surface-tint": "#cabeff",
                    "surface-dim": "#14121b",
                    "surface-container": "#201e28",
                    "on-background": "#e6e0ee",
                    "background": "#14121b",
                    "surface-container-high": "#2b2933",
                    "inverse-primary": "#603ce2",
                    "on-primary-fixed-variant": "#4816cb",
                    "secondary-container": "#42474f",
                    "error": "#ffb4ab",
                    "primary": "#cabeff",
                    "on-surface-variant": "#c9c4d8",
                    "tertiary": "#ffb780",
                    "error-container": "#93000a",
                    "primary-fixed-dim": "#cabeff",
                    "on-surface": "#e6e0ee"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "1.5rem",
                    "container-max": "1280px",
                    "unit": "4px",
                    "sm": "1rem",
                    "md": "1.5rem",
                    "lg": "2.5rem",
                    "xs": "0.5rem",
                    "xl": "4rem"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "mono-md": ["monospace"],
                    "label-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-sm": ["Inter"],
                    "headline-xl": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "mono-md": ["14px", {"lineHeight": "1", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .glass-card {
            background: rgba(21, 24, 28, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #272C33;
        }
        .glow-hover:hover {
            box-shadow: 0 0 20px rgba(124, 92, 255, 0.15);
        }
    </style>
</head>
<body class="bg-[#0E1113] text-[#EAEFF4] font-body-md antialiased overflow-x-hidden">
<main class="min-h-screen flex flex-col items-center justify-center px-6 relative">
<!-- Abstract Background Element -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-[#7C5CFF] opacity-5 blur-[120px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-[#7C5CFF] opacity-[0.03] blur-[100px]"></div>
</div>
<!-- Header Section -->
<div class="z-10 flex flex-col items-center text-center mb-12">
<div class="p-4 rounded-2xl bg-[#7C5CFF]/10 ring-1 ring-[#7C5CFF]/20 shadow-[0_0_20px_rgba(124,92,255,0.1)]">
<span class="material-symbols-outlined text-[#7C5CFF] text-4xl" data-icon="confirmation_number">confirmation_number</span>
</div>
<h1 class="font-headline-xl text-white mt-6 tracking-tighter">StellarTickets</h1>
<p class="font-body-lg text-[#B7C0CC] mt-2 max-w-md">NFT event tickets on the Stellar blockchain</p>
</div>
<!-- Role Selection Grid -->
<div class="z-10 w-full max-w-md flex flex-col gap-4">
<!-- Attendee Card -->
<button class="glass-card group p-6 rounded-2xl flex items-center gap-5 transition-all duration-300 hover:border-[#7C5CFF]/50 text-left glow-hover">
<div class="flex-shrink-0 w-14 h-14 flex items-center justify-center rounded-xl bg-[#7C5CFF]/5 text-[#7C5CFF] group-hover:bg-[#7C5CFF] group-hover:text-white transition-all">
<span class="material-symbols-outlined text-3xl" data-icon="group">group</span>
</div>
<div class="flex-grow">
<h2 class="font-headline-md text-white">I'm an Attendee</h2>
<p class="font-body-sm text-[#B7C0CC]">Browse events, buy tickets with XLM</p>
</div>
<div class="opacity-0 group-hover:opacity-100 transition-opacity text-[#7C5CFF]">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
<!-- Organizer Card -->
<button class="glass-card group p-6 rounded-2xl flex items-center gap-5 transition-all duration-300 hover:border-[#7C5CFF]/50 text-left glow-hover">
<div class="flex-shrink-0 w-14 h-14 flex items-center justify-center rounded-xl bg-[#7C5CFF]/5 text-[#7C5CFF] group-hover:bg-[#7C5CFF] group-hover:text-white transition-all">
<span class="material-symbols-outlined text-3xl" data-icon="dashboard">dashboard</span>
</div>
<div class="flex-grow">
<h2 class="font-headline-md text-white">I'm an Organizer</h2>
<p class="font-body-sm text-[#B7C0CC]">Create events, manage sales, release funds</p>
</div>
<div class="opacity-0 group-hover:opacity-100 transition-opacity text-[#7C5CFF]">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
</div>
<!-- Visual Anchor: NFT Mockup Preview (Contextual Background) -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-48 opacity-10 pointer-events-none mask-image-gradient">
<div class="grid grid-cols-3 gap-6">
<div class="h-64 border border-[#272C33] rounded-t-3xl bg-gradient-to-b from-[#15181C] to-transparent"></div>
<div class="h-80 border border-[#272C33] rounded-t-3xl bg-gradient-to-b from-[#15181C] to-transparent"></div>
<div class="h-64 border border-[#272C33] rounded-t-3xl bg-gradient-to-b from-[#15181C] to-transparent"></div>
</div>
</div>
<!-- Footer Credits -->
<footer class="mt-16 z-10 flex flex-col items-center">
<div class="flex items-center gap-2 mb-4">
<div class="h-[1px] w-8 bg-[#272C33]"></div>
<span class="font-mono-md text-[10px] uppercase tracking-widest text-[#B7C0CC]/60">Secure Protocol</span>
<div class="h-[1px] w-8 bg-[#272C33]"></div>
</div>
<p class="font-label-md text-[#B7C0CC]/40 text-[10px] tracking-wider uppercase">
                Powered by Stellar · Soroban smart contracts
            </p>
</footer>
</main>
<style>
        .mask-image-gradient {
            mask-image: linear-gradient(to top, transparent 0%, black 100%);
            -webkit-mask-image: linear-gradient(to top, transparent 0%, black 100%);
        }
    </style>
</body></html>
