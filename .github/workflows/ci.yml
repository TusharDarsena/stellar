name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contracts:
    name: 🦀 Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts -> target

      - name: Check
        run: cargo check --target wasm32v1-none
        working-directory: contracts

      - name: Test
        run: cargo test
        working-directory: contracts

  frontend:
    name: ⚡ Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_TICKET_CONTRACT_ID: dummy
          VITE_MARKETPLACE_CONTRACT_ID: dummy
          VITE_NETWORK_PASSPHRASE: dummy
          VITE_RPC_URL: dummy
          VITE_SUPABASE_URL: dummy
          VITE_SUPABASE_ANON_KEY: dummy
